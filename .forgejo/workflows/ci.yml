name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    container:
      image: lthn/build:php-${{ matrix.php }}

    strategy:
      fail-fast: true
      matrix:
        php: ["8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Configure local path repositories
        run: |
          if [ -f ../php/composer.json ]; then
            composer config repositories.core path ../php --no-interaction
          else
            echo "No ../php checkout; Composer will use published metadata for lthn/php"
          fi

          if [ -f ../php-tenant/composer.json ]; then
            composer config repositories.tenant path ../php-tenant --no-interaction
          else
            echo "No ../php-tenant checkout; Composer will use published metadata for lthn/php-tenant"
          fi

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: |
          if [ -f vendor/bin/pint ]; then
            vendor/bin/pint --test
          else
            echo "Pint not installed, skipping"
          fi

      - name: Run unit tests
        run: |
          if [ -f vendor/bin/pest ]; then
            if [ -d tests/Unit ] || [ -d tests/unit ]; then
              vendor/bin/pest tests/Unit --ci
            elif [ -d src/Tests/Unit ]; then
              vendor/bin/pest src/Tests/Unit --ci
            else
              echo "No unit test directory found, skipping"
            fi
          elif [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit --testsuite=Unit
          else
            echo "No test runner found, skipping"
          fi
